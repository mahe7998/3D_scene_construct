services:
  # ===========================================================================
  # ASSET DOWNLOADER SERVICE
  # ===========================================================================
  asset_downloader:
    build:
      context: .
      dockerfile: docker/base.Dockerfile
    image: 3d-scene-construct/base:latest
    container_name: asset_downloader
    volumes:
      - ./data:/data
      - ./src:/app/src
      - ./config:/app/config
    environment:
      - ASSET_COUNT=${ASSET_COUNT:-1000}
      - ASSET_BATCH_SIZE=${ASSET_BATCH_SIZE:-10}
      - ASSET_DOWNLOAD_WORKERS=${ASSET_DOWNLOAD_WORKERS:-4}
      # objaverse caches annotations under $HOME/.objaverse; point it at the
      # persisted /data volume so re-runs skip the 10-minute metadata fetch.
      - HOME=/data/cache
    entrypoint: ["python3", "-m", "src.asset_management.downloader"]
    command: []
    restart: "no"

  # ===========================================================================
  # RENDERER SERVICE (Blender)
  # ===========================================================================
  renderer:
    build:
      context: .
      dockerfile: docker/blender.Dockerfile
    image: 3d-scene-construct/blender:latest
    container_name: renderer
    volumes:
      - ./data:/data
      - ./src:/app/src
      - ./config:/app/config
    environment:
      - RENDER_RESOLUTION=${RENDER_RESOLUTION:-512}
      - RENDER_SAMPLES=${RENDER_SAMPLES:-128}
      - RENDER_ENGINE=${RENDER_ENGINE:-CYCLES}
      - RENDER_DEVICE=${RENDER_DEVICE:-GPU}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${DOCKER_GPU_COUNT:-1}
              capabilities: [gpu]
    shm_size: ${DOCKER_SHM_SIZE:-8g}
    entrypoint: ["blender", "--background", "--python-exit-code", "1", "--python", "/app/src/rendering/renderer.py", "--"]
    command: []
    restart: "no"

  # ===========================================================================
  # vLLM INFERENCE SERVER (OpenAI-compatible)
  # ===========================================================================
  # Serves the vision-language model with paged attention + continuous batching
  # for high RL-loop throughput. Uses the official upstream image (no custom
  # build); weights are bind-mounted from the host ./data/models so nothing is
  # baked in and the same files are reusable for fine-tuning.
  # NOTE: requires a vLLM build with Qwen2.5-VL support (>= 0.7.2 / transformers
  # >= 4.49). Pin a tag here if `latest` ever regresses.
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    volumes:
      - ./data/models:/models
      - ./data/cache:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    command: >
      --model /models/Qwen2.5-VL-7B-Instruct
      --served-model-name qwen2.5-vl-7b
      --dtype bfloat16
      --max-model-len 8192
      --gpu-memory-utilization 0.92
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${DOCKER_GPU_COUNT:-1}
              capabilities: [gpu]
    shm_size: ${DOCKER_SHM_SIZE:-8g}
    ports:
      - "8001:8000"   # host 8001 -> vLLM 8000 (in-network: http://vllm:8000)
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 300s
    restart: unless-stopped

  # ===========================================================================
  # VISION LLM SERVICE
  # ===========================================================================
  vision_model:
    build:
      context: .
      dockerfile: docker/vision.Dockerfile
    image: 3d-scene-construct/vision:latest
    container_name: vision_model
    volumes:
      - ./data:/data
      - ./src:/app/src
      - ./config:/app/config
    environment:
      - VISION_BATCH_SIZE=${VISION_BATCH_SIZE:-8}
    # Thin proxy over vLLM (project-specific prompts + /describe API). No GPU of
    # its own - vLLM owns the device.
    depends_on:
      vllm:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: python -m src.vision.server
    restart: unless-stopped

  # ===========================================================================
  # ANNOTATOR SERVICE
  # ===========================================================================
  annotator:
    build:
      context: .
      dockerfile: docker/vision.Dockerfile
    image: 3d-scene-construct/vision:latest
    container_name: annotator
    volumes:
      - ./data:/data
      - ./src:/app/src
      - ./config:/app/config
    environment:
      - VISION_BATCH_SIZE=${VISION_BATCH_SIZE:-8}
    # Calls the VisionModel vLLM client directly, so it depends on vLLM (not the
    # vision_model proxy).
    depends_on:
      vllm:
        condition: service_healthy
    command: python -m src.vision.annotator
    restart: "no"

  # ===========================================================================
  # SCENE GENERATOR SERVICE
  # ===========================================================================
  scene_generator:
    build:
      context: .
      dockerfile: docker/blender.Dockerfile
    image: 3d-scene-construct/blender:latest
    container_name: scene_generator
    volumes:
      - ./data:/data
      - ./src:/app/src
      - ./config:/app/config
    environment:
      - RENDER_RESOLUTION=${RENDER_RESOLUTION:-512}
      - RENDER_SAMPLES=${RENDER_SAMPLES:-128}
      - RENDER_DEVICE=${RENDER_DEVICE:-GPU}
      - SCENE_COMPLEXITY_START=${SCENE_COMPLEXITY_START:-1}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${DOCKER_GPU_COUNT:-1}
              capabilities: [gpu]
    shm_size: ${DOCKER_SHM_SIZE:-8g}
    command: python -m src.scene.generator
    restart: "no"

  # ===========================================================================
  # RL TRAINER SERVICE
  # ===========================================================================
  rl_trainer:
    build:
      context: .
      dockerfile: docker/rl.Dockerfile
    image: 3d-scene-construct/rl:latest
    container_name: rl_trainer
    volumes:
      - ./data:/data
      - ./src:/app/src
      - ./config:/app/config
    environment:
      - RL_ALGORITHM=${RL_ALGORITHM:-PPO}
      - RL_LEARNING_RATE=${RL_LEARNING_RATE:-0.0003}
      - RL_TOTAL_TIMESTEPS=${RL_TOTAL_TIMESTEPS:-1000000}
      - RL_N_ENVS=${RL_N_ENVS:-4}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
    depends_on:
      - vision_model
      - scene_generator
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${DOCKER_GPU_COUNT:-1}
              capabilities: [gpu]
    shm_size: ${DOCKER_SHM_SIZE:-8g}
    command: python -m src.rl.trainer
    restart: "no"

  # ===========================================================================
  # POSE REFINEMENT SERVICE (nvdiffrast render-and-compare)
  # ===========================================================================
  refine:
    build:
      context: .
      dockerfile: docker/refine.Dockerfile
    image: 3d-scene-construct/refine:latest
    container_name: refine
    volumes:
      - ./data:/data
      - ./src:/app/src
      - ./config:/app/config
    environment:
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${DOCKER_GPU_COUNT:-1}
              capabilities: [gpu]
    shm_size: ${DOCKER_SHM_SIZE:-8g}
    restart: "no"

  # ===========================================================================
  # MONITORING SERVICE (Tensorboard)
  # ===========================================================================
  monitor:
    image: tensorflow/tensorflow:latest
    container_name: monitor
    volumes:
      - ./data/logs:/logs
    ports:
      - "${TENSORBOARD_PORT:-6006}:6006"
    command: tensorboard --logdir=/logs --host=0.0.0.0
    restart: unless-stopped

  # ===========================================================================
  # TESTING SERVICE
  # ===========================================================================
  tests:
    build:
      context: .
      dockerfile: docker/base.Dockerfile
    image: 3d-scene-construct/base:latest
    container_name: tests
    volumes:
      - ./data:/data
      - ./src:/app/src
      - ./config:/app/config
      - ./tests:/app/tests
    environment:
      - PYTHONPATH=/app
    command: pytest tests/ -v
    restart: "no"

networks:
  default:
    name: 3d-scene-network
